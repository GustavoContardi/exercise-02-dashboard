services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noderegistry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noderegistry}
      POSTGRES_DB: ${POSTGRES_DB:-noderegistry}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noderegistry}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-noderegistry}:${POSTGRES_PASSWORD:-noderegistry}@db:5432/${POSTGRES_DB:-noderegistry}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:8080
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  db_data: